name: Build & Release

on:
  push:
    branches: [ main ]
    paths: [ 'app/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'app/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version=8.5
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Get version info
        id: version
        run: |
          echo "date=$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      - name: Prepare release APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/YourVPNDead-v${{ steps.version.outputs.count }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YourVPNDead
          path: release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.count }}
          name: "YourVPNDead v${{ steps.version.outputs.count }} (${{ steps.version.outputs.date }})"
          body: |
            ## Автоматический релиз

            **Дата:** ${{ steps.version.outputs.date }}
            **Коммит:** [`${{ steps.version.outputs.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})

            ### Изменения
            ${{ github.event.head_commit.message }}

            ---
            📥 Скачайте **YourVPNDead-v${{ steps.version.outputs.count }}.apk** и установите на Android.
          artifacts: "release/*.apk"
          makeLatest: true
          allowUpdates: true
